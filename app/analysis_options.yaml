# Прагматичный строгий профиль (WP-00 решение: без coverage-гейтов,
# но с жёсткой статикой).
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    unused_import: error
    dead_code: error
  exclude:
    - "**/*.g.dart"

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls
    - avoid_slow_async_io
    - cancel_subscriptions
    - close_sinks
    - directives_ordering
    - prefer_final_locals
    - prefer_single_quotes
    - throw_in_finally
    - unawaited_futures
    - unnecessary_await_in_return
