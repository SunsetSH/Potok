org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Репозиторий намеренно живёт в каталоге `Поток`; AGP иначе блокирует
# Windows-сборку до запуска компилятора только из-за non-ASCII пути.
android.overridePathCheck=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
# Инкрементальные кэши Kotlin ломаются на этом диске (junction/ФС):
# "Could not close incremental caches" — отключаем, сборка чуть дольше, но стабильна.
kotlin.incremental=false
